<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Croxen Knowledge{% endblock %}</title>
  <meta name="description" content="{% block description %}A public knowledge base about AI, IT, automation, and personal technology.{% endblock %}">
  <link rel="stylesheet" href="{{ prefix }}/static/style.css">
  <link rel="alternate" type="application/rss+xml" title="Croxen Knowledge" href="{{ prefix }}/feed.xml">
</head>
<body>
  <header>
    <nav>
      <a href="{{ prefix }}/" class="brand">Croxen Knowledge</a>
      <ul>
        <li><a href="{{ prefix }}/learning/">Learning</a></li>
        <li><a href="{{ prefix }}/experiments/">Experiments</a></li>
        <li><a href="{{ prefix }}/guides/">Guides</a></li>
        <li><a href="{{ prefix }}/now/">Now</a></li>
        <li><a href="{{ prefix }}/about/">About</a></li>
        <li><a href="{{ prefix }}/changelog/">Changelog</a></li>
      </ul>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>
    <p>&copy; 2026 Croxen. Content under <a href="https://github.com/Croxen/croxen-knowledge/blob/main/LICENSE">MIT License</a>.</p>
    <p><a href="{{ prefix }}/feed.xml">RSS</a> &middot; <a href="{{ prefix }}/sitemap.xml">Sitemap</a></p>
  </footer>
</body>
</html>
