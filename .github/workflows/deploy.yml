name: Deploy to Vercel

# NOTE: Production deploys are NO LONGER automatic on push.
# The dev site's "Approve" (article) and "Approve design" buttons call
# the Vercel API directly to push changes to production. This keeps prod
# changes under explicit human approval.
#
# Manual deploy (if ever needed):
#   gh workflow run deploy.yml --repo Croxen/croxen-knowledge
on:
  workflow_dispatch:

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install jinja2 markdown

      - name: Build site
        run: python3 build.py

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to production
        run: vercel deploy --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_PROJECT_ID: prj_EnzbG8pgBkAI7Z61JjP4TWMp4VCp
          VERCEL_ORG_ID: TZfhFYnpDiNEb3roBn9pzad3
